# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - imagetext-to-image-bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Prepare deployment bundle (exclude node_modules to keep artifact small)
        run: |
          mkdir -p deploy-app
          cp package.json deploy-app/
          cp package-lock.json deploy-app/ 2>/dev/null || true
          cp -r src deploy-app/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-app

  # GitHub: AZUREAPPSERVICE_PUBLISHPROFILE_95A0C70C5DC74B73939BF0BBA7509A48 (for deploying)
  # Bot env: TELEGRAM_BOT_TOKEN, GEMINI_API_KEY — set in Azure Portal → App Service → Configuration → Application settings
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Install production dependencies
        run: npm ci || npm install --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        timeout-minutes: 15
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'imagetext-to-image-bot'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_95A0C70C5DC74B73939BF0BBA7509A48 }}